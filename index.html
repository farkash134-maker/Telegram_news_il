<div id="categories">
    <h3>בחר תחום עניין:</h3>
    <button onclick="sendCategory('חדשות')">חדשות כללי</button>
    <button onclick="sendCategory('כלכלה')">כלכלה</button>
    <button onclick="sendCategory('ספורט')">ספורט</button>
    <button onclick="sendCategory('תרבות')">בידור ותרבות</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    
    function sendCategory(cat) {
        // שולח את הבחירה לבוט וסוגר את האפליקציה
        tg.sendData(cat);
        tg.close();
    }
</script>
