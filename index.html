<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .btn { 
            width: 100%; padding: 20px; margin: 10px 0; font-size: 18px; font-weight: bold;
            background: #0088cc; color: white; border: none; border-radius: 15px;
        }
    </style>
</head>
<body>
    <h3>בחר נושא לחדשות:</h3>
    <button class="btn" onclick="send('חדשות')">📰 חדשות</button>
    <button class="btn" onclick="send('כלכלה')">💰 כלכלה</button>
    <button class="btn" onclick="send('ספורט')">⚽ ספורט</button>
    <button class="btn" onclick="send('תרבות')">🎭 תרבות</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        function send(cat) {
            tg.sendData(cat); // שליחת המילה לבוט
            tg.close();       // סגירה מיידית
        }
    </script>
</body>
</html>
