<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>האפליקציה שלי</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; border-radius: 8px; }
    </style>
</head>
<body>
    <h1 id="user-name">שלום!</h1>
    <p>זו אפליקציית הטלגרם הראשונה שלך.</p>
    <button id="main-button">שלח נתונים לבוט</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // פותח את האפליקציה על כל המסך

        // הצגת שם המשתמש מתוך טלגרם
        if (tg.initDataUnsafe.user) {
            document.getElementById('user-name').innerText = `שלום, ${tg.initDataUnsafe.user.first_name}!`;
        }

        // שליחת נתונים חזרה לבוט וסגירת האפליקציה
        document.getElementById('main-button').addEventListener('click', () => {
            tg.sendData("המשתמש לחץ על הכפתור!");
            tg.close();
        });
    </script>
</body>
</html>
